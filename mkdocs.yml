site_name: ПП.ПМ.05 Соадминистрирование и автоматизация БД и серверов

use_directory_urls: false

theme:
  name: material
  logo: assets/icons/logo.png
  favicon: assets/icons/logo.png
  language: ru
  features:
    - content.code.copy
    - content.image.zoom
    - navigation.top
    - navigation.tracking
    - toc.follow

plugins:
  - glightbox
  - search

nav:
  - Главная: index.md
  - Предметные области: subject_areas.md
  - Теория:
      - Этап 1. Проектирование базы данных: theory/stage1.md
      - Этап 2. Объекты БД — VIEW, процедуры, триггеры: theory/stage2.md
      - Этап 3. Безопасность — роли СУБД и хэширование: theory/stage3.md
      - Этап 4. CRUD и запросы с JOIN: theory/stage4.md
  - Практика:
      - Этап 1. Проектирование базы данных: practice/stage1.md
      - Этап 2. Объекты БД — VIEW, процедуры, триггеры: practice/stage2.md
      - Этап 3. Безопасность — роли СУБД и хэширование: practice/stage3.md
      - Этап 4. CRUD и запросы с JOIN: practice/stage4.md

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.details
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js

extra_css:
  - assets/stylesheets/extra.css
